<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>繁星日历 · 每日英语</title>

<!-- PWA / 手机 APP -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a56db">
<meta name="description" content="繁星英语 · 每日朗读 / 跟读 / 听力 / 词汇 / 翻译 / 听写">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="繁星日历">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<!-- iOS 启动图 -->
<link rel="apple-touch-startup-image" href="icons/splash-1290x2796.png" media="(device-width:430px) and (device-height:932px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
<link rel="apple-touch-startup-image" href="icons/splash-1179x2556.png" media="(device-width:393px) and (device-height:852px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
<link rel="apple-touch-startup-image" href="icons/splash-1284x2778.png" media="(device-width:428px) and (device-height:926px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
<link rel="apple-touch-startup-image" href="icons/splash-1170x2532.png" media="(device-width:390px) and (device-height:844px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
<link rel="apple-touch-startup-image" href="icons/splash-1242x2688.png" media="(device-width:414px) and (device-height:896px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
<link rel="apple-touch-startup-image" href="icons/splash-828x1792.png"  media="(device-width:414px) and (device-height:896px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)">
<link rel="apple-touch-startup-image" href="icons/splash-1125x2436.png" media="(device-width:375px) and (device-height:812px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
<link rel="apple-touch-startup-image" href="icons/splash-750x1334.png"  media="(device-width:375px) and (device-height:667px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)">
<link rel="apple-touch-startup-image" href="icons/splash-640x1136.png"  media="(device-width:320px) and (device-height:568px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4ff;color:#1e293b;min-height:100vh}
header{background:linear-gradient(135deg,#1a56db,#6366f1);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
header a{color:#fff;text-decoration:none;font-size:13px;opacity:.8;margin-right:8px}
header h1{font-size:18px;flex:1}
.date-nav{display:flex;align-items:center;gap:8px;background:#fff;border-radius:12px;padding:10px 16px;margin:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.date-nav select{border:none;background:transparent;font-size:16px;font-weight:600;color:#1a56db;outline:none;flex:1}
.date-nav button{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .2s}
.date-nav button:hover{background:#e8eeff}
.day-header{margin:0 12px 8px;background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.day-header .week-theme{font-size:13px;color:#64748b}
.day-header h2{font-size:22px;font-weight:700;color:#1a56db;margin:4px 0 2px}
.day-header .theme-zh{font-size:15px;color:#475569}
.mode-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;scrollbar-width:none}
.mode-bar::-webkit-scrollbar{display:none}
.mode-btn{padding:7px 14px;border-radius:20px;border:2px solid #1a56db;background:#fff;color:#1a56db;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.mode-btn.active{background:#1a56db;color:#fff}
.panel{display:none;padding:0 12px 80px}
.panel.active{display:block}
.card{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
.card-header{padding:12px 16px;background:#f8faff;border-bottom:1px solid #e8eeff;display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px;color:#1a56db}
.card-body{padding:16px}
.sentence-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.sentence-row:last-child{border-bottom:none}
.sentence-row .num{background:#e8eeff;color:#1a56db;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.sentence-row .texts{flex:1}
.sentence-row .en{font-size:15px;line-height:1.6;color:#1e293b;font-weight:500}
.sentence-row .zh{font-size:13px;line-height:1.5;color:#64748b;margin-top:2px}
.play-btn{background:#e8eeff;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;flex-shrink:0;transition:background .2s;font-weight:600;color:#1a56db}
.play-btn:hover{background:#d1d9ff}
.play-btn.playing{background:#1a56db;color:#fff}
.stop-btn{background:#fee2e2;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;flex-shrink:0;color:#dc2626;font-weight:600;transition:background .2s}
.stop-btn:hover{background:#fecaca}
.follow-btn{background:#fff3e0;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;flex-shrink:0;transition:background .2s;color:#b45309;font-weight:600}
.follow-btn:hover{background:#ffe0b2}
.follow-btn.your-turn{background:#22c55e;color:#fff;animation:pulse .6s ease-in-out 3}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.vocab-card{background:#f8faff;border:1.5px solid #e8eeff;border-radius:10px;padding:10px 12px;transition:all .2s;display:flex;align-items:center;gap:8px}
.vocab-card:hover{border-color:#1a56db;background:#e8eeff}
.vocab-card.playing{border-color:#1a56db;background:#e8eeff}
.vocab-card .en{font-size:14px;font-weight:600;color:#1a56db;flex:1}
.vocab-card .zh{font-size:13px;color:#64748b;margin-top:2px}
.vocab-info{flex:1}
.vocab-play{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:#1a56db;flex-shrink:0}
.vocab-band-btn{width:100%;padding:10px;background:#1a56db;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px}
.vocab-band-btn:hover{background:#1447be}
.display-toggle{display:flex;gap:6px;margin-bottom:12px}
.display-toggle button{flex:1;padding:7px;border-radius:8px;border:1.5px solid #cbd5e1;background:#fff;font-size:13px;cursor:pointer;transition:all .2s}
.display-toggle button.active{background:#1a56db;color:#fff;border-color:#1a56db}
.hide{display:none!important}
/* 3-pass listening */
.listening-pass{display:flex;gap:8px;margin-bottom:12px}
.pass-btn{flex:1;padding:10px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.pass-btn.active{border-color:#1a56db;background:#e8eeff;color:#1a56db}
.pass-btn.done{border-color:#22c55e;background:#dcfce7;color:#166534}
.listening-display .sentence-item{padding:12px;border-radius:10px;margin-bottom:8px;background:#f8faff;border:1px solid #e8eeff;transition:all .3s}
.listening-display .sentence-item.current{background:#e8eeff;border-color:#1a56db}
.big-play-btn{width:100%;padding:14px;background:#1a56db;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;transition:background .2s}
.big-play-btn:hover{background:#1447be}
.big-play-btn:disabled{background:#94a3b8}
/* Vocab */
.vocab-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.vocab-card{background:#f8faff;border:1.5px solid #e8eeff;border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .2s}
.vocab-card:hover{border-color:#1a56db;background:#e8eeff}
.vocab-card .en{font-size:14px;font-weight:600;color:#1a56db}
.vocab-card .zh{font-size:13px;color:#64748b;margin-top:2px}
/* Ordering */
.ordering-area{min-height:60px;border:2px dashed #cbd5e1;border-radius:10px;padding:8px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px}
.ordering-area.has-items{border-color:#1a56db;background:#f8faff}
.order-chip{background:#1a56db;color:#fff;padding:8px 12px;border-radius:8px;font-size:14px;cursor:pointer;user-select:none;line-height:1.4}
.order-chip.source{background:#e8eeff;color:#1a56db}
.order-chip.correct{background:#22c55e}
.order-chip.wrong{background:#ef4444}
.order-result{padding:12px;border-radius:10px;margin-top:10px;font-size:14px;font-weight:600;text-align:center}
.order-result.correct{background:#dcfce7;color:#166534}
.order-result.wrong{background:#fee2e2;color:#991b1b}
/* Fill blank */
.blank-input{border:2px solid #cbd5e1;border-radius:6px;padding:4px 8px;font-size:14px;width:100px;outline:none;transition:border .2s}
.blank-input:focus{border-color:#1a56db}
.blank-input.correct{border-color:#22c55e;background:#dcfce7}
.blank-input.wrong{border-color:#ef4444;background:#fee2e2}
.fill-text{font-size:15px;line-height:2.2;color:#1e293b}
/* Translation */
.translation-challenge{background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:14px;margin-bottom:12px}
.translation-challenge .zh-prompt{font-size:16px;color:#92400e;font-weight:500;line-height:1.6}
textarea.answer-box{width:100%;border:2px solid #cbd5e1;border-radius:10px;padding:12px;font-size:15px;line-height:1.6;resize:vertical;min-height:80px;outline:none;font-family:inherit;transition:border .2s}
textarea.answer-box:focus{border-color:#1a56db}
.reveal-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px;margin-top:10px;font-size:15px;color:#166534;line-height:1.6;display:none}
/* Dictation */
.dictation-controls{display:flex;gap:8px;margin-bottom:12px}
.dictation-controls button{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.play-dictation{background:#1a56db;color:#fff}
.play-dictation:hover{background:#1447be}
.score-badge{background:#1a56db;color:#fff;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700}
.btn{padding:10px 20px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#1a56db;color:#fff}
.btn-primary:hover{background:#1447be}
.btn-outline{background:#fff;color:#1a56db;border:2px solid #1a56db}
.btn-outline:hover{background:#e8eeff}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.progress-bar-wrap{background:#e2e8f0;border-radius:99px;height:8px;margin:8px 0}
.progress-bar{background:#1a56db;height:8px;border-radius:99px;transition:width .4s}
.score-summary{text-align:center;padding:20px}
.score-summary .big-score{font-size:48px;font-weight:800;color:#1a56db}
.score-summary .label{font-size:16px;color:#64748b;margin-top:4px}
.no-content{text-align:center;padding:40px;color:#94a3b8;font-size:15px}
/* ===== 手机 / PWA 适配 ===== */
/* iOS 底部 Home 条安全区 */
.panel{padding-bottom:max(80px,calc(60px + env(safe-area-inset-bottom)))}
/* 触控目标放大：至少 44px 高 */
.play-btn,.stop-btn,.follow-btn{min-height:36px;padding:8px 12px}
.mode-btn{min-height:40px;padding:8px 14px}
.btn{min-height:44px}
.big-play-btn{min-height:52px;font-size:17px}
/* 小屏 sentence-row：按钮换行到下一行 */
@media(max-width:400px){
  .sentence-row{flex-wrap:wrap}
  .sentence-row .texts{width:100%;flex:none}
  .play-btn,.stop-btn,.follow-btn{flex:1;min-width:0}
}
/* 安卓 / 桌面安装提示按钮 */
#install-btn{display:none;background:#fff;color:#1a56db;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
#install-btn:hover{background:#e8eeff}
</style>
</head>
<body>

<header>
  <a href="index.html">← 看板</a>
  <h1>繁星日历 · 每日英语</h1>
  <button id="tts-test-btn" title="裸 speak 测试" style="background:#fff;color:#1a56db;border:none;border-radius:8px;padding:6px 10px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0" onclick="ttsNuclearTest()">🔊 裸测</button>
  <button id="tts-speak-btn" title="走speakText测试" style="background:#fff3e0;color:#b45309;border:none;border-radius:8px;padding:6px 10px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0" onclick="speakText('hello world',null)">🔊 常规</button>
  <button id="install-btn" title="安装到桌面">📲 安装</button>
</header>
<!-- TTS 状态提示：speakText 调用时实时显示，无需打开开发者工具 -->
<div id="tts-status" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(30,41,59,.92);color:#f8fafc;font-size:12px;padding:7px 18px;border-radius:20px;z-index:9999;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none"></div>

<div class="date-nav">
  <button id="prev-day" title="上一天">◀</button>
  <input type="date" id="date-input" style="border:none;background:transparent;font-size:16px;font-weight:600;color:#1a56db;outline:none;flex:1;min-width:0">
  <button id="next-day" title="下一天">▶</button>
</div>

<div class="day-header" id="day-header">
  <div class="week-theme" id="day-week"></div>
  <h2 id="day-theme-en"></h2>
  <div class="theme-zh" id="day-theme-zh"></div>
</div>

<div class="mode-bar">
  <button class="mode-btn active" data-panel="read">📖 朗读</button>
  <button class="mode-btn" data-panel="listen">🎧 听力</button>
  <button class="mode-btn" data-panel="vocab">📇 词汇</button>
  <button class="mode-btn" data-panel="order">🔀 排序</button>
  <button class="mode-btn" data-panel="fill">✏️ 填空</button>
  <button class="mode-btn" data-panel="trans">🔄 翻译</button>
  <button class="mode-btn" data-panel="dictation">🎙️ 听写</button>
</div>

<!-- PANEL: 朗读 -->
<div class="panel active" id="panel-read">
  <div class="display-toggle">
    <button class="active" data-disp="both">中英对照</button>
    <button data-disp="en">仅英文</button>
    <button data-disp="zh">仅中文</button>
  </div>
  <div class="card">
    <div class="card-header">🅰️ A级 · 定义句</div>
    <div class="card-body" id="read-a"></div>
  </div>
  <div class="card">
    <div class="card-header">🅱️ B&C级 · 例句段落 <button class="play-btn" id="play-all-btn" title="全文朗读">▶ 全文</button><button class="stop-btn" onclick="stopSpeech()" style="margin-left:6px">⏹ 停止</button></div>
    <div class="card-body" id="read-bc"></div>
  </div>
</div>

<!-- PANEL: 听力三遍 -->
<div class="panel" id="panel-listen">
  <div class="card">
    <div class="card-header">🎧 三遍听力进阶模式</div>
    <div class="card-body">
      <div class="listening-pass">
        <div class="pass-btn active" data-pass="1">第1遍<br><small>无字幕</small></div>
        <div class="pass-btn" data-pass="2">第2遍<br><small>英文字幕</small></div>
        <div class="pass-btn" data-pass="3">第3遍<br><small>中英字幕</small></div>
      </div>
      <p style="font-size:12px;color:#64748b;margin-bottom:8px">第1遍先听不看字幕 → 第2遍看英文字幕 → 第3遍中英对照，共 <span id="listen-count">—</span> 句</p>
      <button class="big-play-btn" id="listen-play-btn">▶ 开始朗读（第1遍）</button>
      <button class="stop-btn" id="listen-stop-btn" onclick="stopSpeech()" style="width:100%;margin-bottom:8px">⏹ 停止朗读</button>
      <div class="listening-display" id="listening-display"></div>
    </div>
  </div>
</div>

<!-- PANEL: 词汇 -->
<div class="panel" id="panel-vocab">
  <div class="card">
    <div class="card-header">📇 今日词汇</div>
    <div class="card-body">
      <div class="vocab-grid" id="vocab-grid"></div>
    </div>
  </div>
</div>

<!-- PANEL: 排序 -->
<div class="panel" id="panel-order">
  <div class="card">
    <div class="card-header">🔀 句子排序 · 点击句子重新排列成段落</div>
    <div class="card-body">
      <p style="font-size:13px;color:#64748b;margin-bottom:10px">点击下方句子，按正确顺序排列 ↑</p>
      <div class="ordering-area" id="order-target"></div>
      <div id="order-source" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="check-order-btn">检查答案</button>
        <button class="btn btn-outline" id="reset-order-btn">重置</button>
      </div>
      <div id="order-result"></div>
    </div>
  </div>
</div>

<!-- PANEL: 填空 -->
<div class="panel" id="panel-fill">
  <div class="card">
    <div class="card-header">✏️ 听力填空</div>
    <div class="card-body">
      <div id="fill-content"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="check-fill-btn">检查答案</button>
        <button class="btn btn-outline" id="reveal-fill-btn">显示答案</button>
        <button class="btn btn-outline" id="reset-fill-btn">重置</button>
      </div>
      <div id="fill-result" style="margin-top:10px;font-size:14px;font-weight:600"></div>
    </div>
  </div>
</div>

<!-- PANEL: 翻译 -->
<div class="panel" id="panel-trans">
  <div class="card">
    <div class="card-header">🔄 翻译练习</div>
    <div class="card-body">
      <div class="translation-challenge">
        <div style="font-size:12px;color:#92400e;margin-bottom:6px">请把以下中文翻译成英文：</div>
        <div class="zh-prompt" id="trans-zh"></div>
      </div>
      <textarea class="answer-box" id="trans-input" placeholder="在此输入你的英文翻译..."></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" id="reveal-trans-btn">显示参考答案</button>
        <button class="btn btn-outline" id="play-trans-btn">▶ 朗读答案</button>
      </div>
      <div class="reveal-box" id="trans-answer"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">📝 翻译要点</div>
    <div class="card-body">
      <p style="font-size:13px;color:#64748b;line-height:1.7" id="trans-tips">注意关键词的使用，尽量用今日主题词汇。</p>
    </div>
  </div>
</div>

<!-- PANEL: 听写 -->
<div class="panel" id="panel-dictation">
  <div class="card">
    <div class="card-header">🎙️ 听写练习</div>
    <div class="card-body">
      <p style="font-size:13px;color:#64748b;margin-bottom:12px">点击「播放」听英文句子，然后写下来。拖动进度条可随时退后或提前。</p>
      <div class="dictation-controls">
        <button class="play-dictation btn" id="play-dictation-btn">▶ 播放</button>
        <button class="stop-btn" id="stop-dictation-btn" style="flex:none;padding:10px 16px;font-size:14px">⏹ 停止</button>
      </div>
      <div style="margin:8px 0 12px">
        <input type="range" id="dictation-seek" min="0" max="100" value="0"
               style="width:100%;accent-color:#1a56db;cursor:pointer;height:6px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-top:4px">
          <span>◀ 退后</span><span>提前 ▶</span>
        </div>
      </div>
      <textarea class="answer-box" id="dictation-input" placeholder="在此输入你听到的内容..."></textarea>
      <div class="btn-row">

    levelA:{en:"A moderator is someone who facilitates a discussion, panel, or meeting — keeping it balanced, on time, and productive.",zh:"主持人是引导讨论、座谈会或会议的人——保持平衡、准时和富有成效。"},

    translation:{zh:"这次圆桌讨论的主持人表现非常出色，既控制了时间，又确保了每个人都有机会发言。",en:"The moderator of this roundtable discussion performed excellently — controlling time while ensuring everyone had a chance to speak."},

  {date:"2026-04-07",week:23,day:"周二",themeEn:"Hard Stop",themeZh:"硬性截止时间",
    levelA:{en:"A 'hard stop' means a firm, non-negotiable end time for a meeting or commitment that cannot be extended.",zh:"'硬性截止时间'是指会议或承诺的固定、不可谈判的结束时间，不能延长。"},
    levelBC:{intro:{en:"Declaring a hard stop at the start of a meeting sets expectations and drives efficiency — people prioritize differently when they know time is truly limited.",zh:"在会议开始时宣布硬性截止时间可以设定预期并提高效率——当人们知道时间是真正有限的时，他们会以不同的方式确定优先级。"},
      sentences:[
        {en:"I have a hard stop at 3 PM, so let's make sure we cover the key points first.",zh:"我下午3点有硬性截止时间，所以让我们先确保涵盖关键点。"},
        {en:"Please note that today's session has a hard stop at noon.",zh:"请注意，今天的会议在中午有硬性截止时间。"},
        {en:"With a hard stop approaching, the team quickly agreed on the most critical items.",zh:"随着硬性截止时间的临近，团队迅速就最关键的事项达成了一致。"},
        {en:"Declare your hard stop at the beginning, not five minutes before the end.",zh:"在开始时宣布你的硬性截止时间，而不是在结束前五分钟。"},
        {en:"Respecting others' hard stops is a sign of professional courtesy.",zh:"尊重他人的硬性截止时间是专业礼貌的体现。"}
      ]},
    vocab:[{en:"hard stop",zh:"硬性截止时间"},{en:"non-negotiable",zh:"不可谈判的"},{en:"efficiency",zh:"效率"},{en:"declare",zh:"宣布"},{en:"courtesy",zh:"礼貌"}],
    translation:{zh:"我两点有个外部电话，所以这个会议我有硬性截止时间，我们先把最重要的议题讨论完。",en:"I have an external call at two o'clock, so I have a hard stop for this meeting — let's discuss the most important items first."},
    listening:null,dictation:null,orderCorrect:[0,1,2,3,4]},
  {date:"2026-04-08",week:23,day:"周三",themeEn:"Breakout Sessions",themeZh:"分组讨论",
    levelA:{en:"Breakout sessions are smaller group discussions that take place within a larger meeting or conference, allowing more focused conversation.",zh:"分组讨论是在较大会议或会议中进行的小组讨论，允许更有针对性的对话。"},
    levelBC:{intro:{en:"Breakout sessions solve one of the biggest meeting problems — large groups rarely achieve depth. Breaking into smaller groups produces richer ideas and more participation.",zh:"分组讨论解决了最大的会议问题之一——大型群组很少能达到深度。分成小组可以产生更丰富的想法和更多的参与。"},
      sentences:[
        {en:"After the keynote, we'll split into breakout sessions by department.",zh:"主题演讲结束后，我们将按部门分成分组讨论。"},
        {en:"The breakout session on pricing strategy generated excellent ideas.",zh:"关于定价策略的分组讨论产生了很好的想法。"},
        {en:"Each breakout session will have a facilitator and a note-taker.",zh:"每个分组讨论都将有一位促进者和一位记录者。"},
        {en:"We'll reconvene after the breakout sessions to share key takeaways.",zh:"分组讨论结束后，我们将重新集合分享关键收获。"},
        {en:"Breakout sessions give quieter participants a chance to contribute more.",zh:"分组讨论给较安静的参与者更多贡献的机会。"}
      ]},
    vocab:[{en:"breakout session",zh:"分组讨论"},{en:"facilitator",zh:"促进者"},{en:"note-taker",zh:"记录者"},{en:"reconvene",zh:"重新集合"},{en:"takeaway",zh:"收获/要点"}],
    translation:{zh:"全体会议结束后，我们分成三个小组进行分组讨论，分别聚焦在产品、市场和运营三个方向。",en:"After the plenary session, we split into three groups for breakout sessions focused on product, marketing, and operations respectively."},
    listening:null,dictation:null,orderCorrect:[0,1,2,3,4]},
  {date:"2026-04-09",week:23,day:"周四",themeEn:"Bulk Order",themeZh:"批量采购/大宗订单",
    levelA:{en:"A bulk order is a large purchase of goods at one time, typically at a discounted price due to the volume.",zh:"批量采购是一次性大量购买商品，通常由于数量而享有折扣价格。"},
    levelBC:{intro:{en:"Bulk orders benefit both sides — buyers get lower unit costs, sellers get volume and predictability. The key is negotiating the right balance of price, MOQ, and delivery schedule.",zh:"批量采购对双方都有利——买方获得更低的单位成本，卖方获得数量和可预测性。关键是谈判价格、最低订购量和交货计划的正确平衡。"},
      sentences:[
        {en:"We're placing a bulk order of 5,000 units — can you offer a volume discount?",zh:"我们正在下5,000件的批量订单——你们能提供批量折扣吗？"},
        {en:"Bulk orders require careful cash flow planning on the buyer's side.",zh:"批量采购需要买方进行仔细的现金流规划。"},
        {en:"We negotiated a 12% discount for the bulk order.",zh:"我们为批量订单谈判了12%的折扣。"},
        {en:"A bulk order helps us secure stable supply for the next six months.",zh:"批量采购帮助我们确保未来六个月的稳定供应。"},
        {en:"For bulk orders, we require a 30% deposit before production begins.",zh:"对于批量订单，我们要求在生产开始前支付30%的定金。"}
      ]},
    vocab:[{en:"bulk order",zh:"批量采购/大宗订单"},{en:"volume discount",zh:"批量折扣"},{en:"deposit",zh:"定金"},{en:"unit cost",zh:"单位成本"},{en:"predictability",zh:"可预测性"}],
    translation:{zh:"客户这次下了一张5000台的大宗订单，我们给予了8%的批量折扣，并要求提前支付30%定金。",en:"The client placed a bulk order for 5,000 units this time — we offered an 8% volume discount and required a 30% deposit upfront."},
    listening:null,dictation:null,orderCorrect:[0,1,2,3,4]},
  {date:"2026-04-10",week:23,day:"周五",themeEn:"Parking Lot",themeZh:"停车场（议题暂存区）",
    levelA:{en:"A 'parking lot' in meetings is a designated place to capture off-topic ideas or questions so they aren't lost but don't derail the current discussion.",zh:"会议中的'停车场'是一个指定位置，用于记录偏离主题的想法或问题，这样它们既不会丢失，也不会使当前讨论脱轨。"},
    levelBC:{intro:{en:"A parking lot is a practical facilitation tool — it acknowledges that the idea has value without letting it hijack the agenda. Always return to the parking lot before closing the meeting.",zh:"停车场是一种实用的促进工具——它承认想法的价值，而不让它劫持议程。在会议结束前始终回到停车场。"},
      sentences:[
        {en:"That's a great point — let's put it in the parking lot and come back to it.",zh:"那是一个很好的观点——让我们把它放进停车场，之后再来讨论。"},
        {en:"We use a parking lot to make sure good ideas don't get lost in long meetings.",zh:"我们使用停车场确保好想法在长时间会议中不会丢失。"},
        {en:"Before we close, let's review the parking lot items.",zh:"在我们结束之前，让我们回顾一下停车场中的议题。"},
        {en:"Adding to the parking lot keeps us on schedule without dismissing anyone's input.",zh:"添加到停车场让我们保持在计划中，同时不忽视任何人的输入。"},
        {en:"The parking lot had three important topics that we scheduled for next week.",zh:"停车场中有三个重要话题，我们安排在下周讨论。"}
      ]},
    vocab:[{en:"parking lot",zh:"议题暂存区"},{en:"derail",zh:"脱轨"},{en:"facilitation",zh:"促进"},{en:"agenda",zh:"议程"},{en:"dismiss",zh:"忽视/解散"}],
    translation:{zh:"当有人提出一个重要但超出今天议程范围的话题时，我把它记在停车场里，约定下次会议再讨论。",en:"When someone raised an important topic outside today's agenda scope, I put it in the parking lot and agreed to discuss it at the next meeting."},
    listening:null,dictation:null,orderCorrect:[0,1,2,3,4]},
  {date:"2026-04-11",week:23,day:"周六",themeEn:"Sleep on It",themeZh:"先考虑一下/暂缓决定",
    levelA:{en:"'Sleep on it' means to wait before making a decision, allowing time to think it over carefully.",zh:"'先考虑一下'是指在做决定之前等待，留时间仔细思考。"},
    levelBC:{intro:{en:"Asking to 'sleep on it' is a sign of wisdom, not indecision — rushing major decisions leads to regret. It also gives you time to consult others or reconsider under less pressure.",zh:"要求'先考虑一下'是智慧的体现，而不是优柔寡断——仓促做出重大决定会导致后悔。它也给你时间咨询他人或在压力较小的情况下重新考虑。"},
      sentences:[
        {en:"This is a big decision — let me sleep on it and get back to you tomorrow.",zh:"这是一个重大决定——让我先考虑一下，明天再回复你。"},
        {en:"Don't let them pressure you into signing today — it's okay to sleep on it.",zh:"不要让他们迫使你今天签字——先考虑一下是完全可以的。"},
        {en:"She slept on it and decided the terms weren't right for her company.",zh:"她考虑了一晚后，决定这些条款不适合她的公司。"},
        {en:"Asking to sleep on it shows you take the decision seriously.",zh:"要求先考虑一下表明你认真对待这个决定。"},
        {en:"We slept on it and came back with a counteroffer the next morning.",zh:"我们考虑了一晚，第二天早上带着反报价回来了。"}
      ]},
    vocab:[{en:"sleep on it",zh:"先考虑一下"},{en:"indecision",zh:"优柔寡断"},{en:"pressure",zh:"压力"},{en:"counteroffer",zh:"反报价"},{en:"reconsider",zh:"重新考虑"}],
    translation:{zh:"对方希望我们当天就签合同，但我们要求先考虑一下，第二天再给出最终答复。",en:"The other party wanted us to sign the contract the same day, but we asked to sleep on it and give a final answer the next day."},
    listening:null,dictation:null,orderCorrect:[0,1,2,3,4]},
  {date:"2026-04-12",week:23,day:"周日",themeEn:"Devil's Advocate",themeZh:"唱反调/提出反方意见",
    levelA:{en:"'Playing devil's advocate' means arguing for the opposite position — not because you believe it, but to test the strength of an idea or decision.",zh:"'唱反调'是指为相反的立场辩护——不是因为你相信它，而是为了测试想法或决定的强度。"},
    levelBC:{intro:{en:"Devil's advocates are valuable in teams — they prevent groupthink, expose weaknesses in plans, and force teams to stress-test their assumptions before committing.",zh:"唱反调者在团队中很有价值——他们防止群体思维，暴露计划中的弱点，并迫使团队在承诺之前对其假设进行压力测试。"},
      sentences:[
        {en:"Let me play devil's advocate: what if the market doesn't respond as we expect?",zh:"让我来唱个反调：如果市场没有如我们预期的那样反应怎么办？"},
        {en:"She always plays devil's advocate in planning sessions — it makes our plans stronger.",zh:"她在规划会议中总是唱反调——这让我们的计划更强大。"},
        {en:"I'm not saying I disagree, but let me play devil's advocate for a moment.",zh:"我不是说我不同意，但让我暂时唱一下反调。"},
        {en:"Playing devil's advocate helps the team anticipate objections before the client does.",zh:"唱反调帮助团队在客户提出异议之前预见这些异议。"},
        {en:"Without someone playing devil's advocate, we might have missed a critical flaw.",zh:"没有人唱反调，我们可能会错过一个关键缺陷。"}
      ]},
    vocab:[{en:"devil's advocate",zh:"唱反调"},{en:"groupthink",zh:"群体思维"},{en:"stress-test",zh:"压力测试"},{en:"assumption",zh:"假设"},{en:"flaw",zh:"缺陷"}],
    translation:{zh:"在方案确定之前，我们安排了一个专门的环节来唱反调，找出计划中可能被忽视的风险。",en:"Before finalizing the plan, we arranged a dedicated session to play devil's advocate and identify risks in the plan that might have been overlooked."},
    listening:null,dictation:null,orderCorrect:[0,1,2,3,4]},
  // ── Week 24 (Apr 13–19) ──
  {date:"2026-04-13",week:24,day:"周一",themeEn:"Groupthink",themeZh:"群体思维",
    levelA:{en:"Groupthink is a phenomenon where the desire for harmony in a group overrides realistic appraisal of alternatives, leading to poor decisions.",zh:"群体思维是一种现象，群体中对和谐的渴望压倒了对替代方案的现实评估，导致糟糕的决策。"},
    levelBC:{intro:{en:"Groupthink is most dangerous in high-performing, cohesive teams — everyone agrees too quickly, no one challenges assumptions, and critical risks go unnoticed.",zh:"群体思维在高绩效、凝聚力强的团队中最危险——每个人都太快同意，没有人挑战假设，关键风险被忽视。"},
      sentences:[
        {en:"The board fell into groupthink and approved a strategy nobody privately supported.",zh:"董事会陷入了群体思维，批准了一个没有人私下支持的策略。"},
        {en:"Encourage dissenting opinions to prevent groupthink in your team.",zh:"鼓励异议意见，以防止团队中的群体思维。"},
        {en:"Groupthink killed Kodak — everyone inside agreed that digital was a threat they could ignore.",zh:"群体思维毁了柯达——内部所有人都同意数字技术是他们可以忽视的威胁。"},
        {en:"Assigning a devil's advocate role in meetings is a proven way to combat groupthink.",zh:"在会议中指定唱反调的角色是对抗群体思维的有效方法。"},
        {en:"Diverse teams are naturally more resistant to groupthink.",zh:"多元化的团队天然地对群体思维更具抵抗力。"}
      ]},
    vocab:[{en:"groupthink",zh:"群体思维"},{en:"cohesive",zh:"凝聚力强的"},{en:"dissent",zh:"异议"},{en:"appraisal",zh:"评估"},{en:"diverse",zh:"多元化的"}],
    translation:{zh:"为了避免群体思维，我们在每次重大决策前都会刻意引入不同的声音和独立的评估视角。",en:"To avoid groupthink, we deliberately introduce different voices and independent evaluation perspectives before every major decision."},
    listening:null,dictation:null,orderCorrect:[0,1,2,3,4]},
  {date:"2026-04-14",week:24,day:"周二",themeEn:"De-escalation",themeZh:"降级/缓和紧张",
    levelA:{en:"De-escalation is the process of reducing tension, conflict, or intensity in a situation.",zh:"降级是减少情况中的紧张、冲突或强度的过程。"},
    levelBC:{intro:{en:"De-escalation is a critical skill in client complaints, difficult negotiations, and team conflicts — staying calm, acknowledging emotions, and redirecting to solutions defuses most situations.",zh:"降级是处理客户投诉、困难谈判和团队冲突的关键技能——保持冷静、承认情绪并将注意力引导到解决方案上可以化解大多数情况。"},
      sentences:[
        {en:"The account manager used de-escalation techniques to calm the angry client.",zh:"客户经理使用降级技巧来安抚愤怒的客户。"},
        {en:"The first step in de-escalation is to listen without interrupting.",zh:"降级的第一步是不打断地倾听。"},
        {en:"When tensions rise in a negotiation, call a break — it's a form of de-escalation.",zh:"当谈判中紧张局势升级时，宣布休息——这是一种降级形式。"},
        {en:"De-escalation requires empathy, not just problem-solving.",zh:"降级需要同理心，而不仅仅是解决问题。"},
        {en:"Proactive communication prevents most issues from reaching the point where de-escalation is needed.",zh:"主动沟通可以防止大多数问题达到需要降级的程度。"}
      ]},
    vocab:[{en:"de-escalation",zh:"降级/缓和"},{en:"empathy",zh:"同理心"},{en:"tension",zh:"紧张"},{en:"defuse",zh:"化解"},{en:"proactive",zh:"主动的"}],
    translation:{zh:"客户因货物延误非常不满，我们的客服团队通过主动承认问题并立即提出补偿方案，成功地缓和了紧张局势。",en:"The client was very upset about the shipping delay. Our customer service team successfully de-escalated the tension by proactively acknowledging the issue and immediately proposing a compensation plan."},
    listening:null,dictation:null,orderCorrect:[0,1,2,3,4]},
  {date:"2026-04-15",week:24,day:"周三",themeEn:"Active Listening",themeZh:"积极倾听",
    levelA:{en:"Active listening means fully concentrating on what someone is saying — not just hearing the words, but understanding the message, emotion, and intent.",zh:"积极倾听是指完全专注于某人说的话——不仅仅是听到词语，而是理解信息、情感和意图。"},
    levelBC:{intro:{en:"Active listening is the most underrated communication skill in business — clients and colleagues feel respected when truly listened to, which builds trust faster than any pitch.",zh:"积极倾听是商业中最被低估的沟通技能——当客户和同事真正被倾听时，他们感到被尊重，这比任何推销都更快地建立信任。"},
      sentences:[
        {en:"Active listening means making eye contact, nodding, and paraphrasing what you heard.",zh:"积极倾听意味着保持眼神接触、点头并用自己的话重述你所听到的。"},
        {en:"She practiced active listening during the negotiation, which helped her identify the client's real concern.",zh:"她在谈判期间练习积极倾听，这帮助她识别了客户真正的顾虑。"},
        {en:"Don't prepare your response while the other person is still talking — that's not listening.",zh:"不要在对方还在说话时就准备你的回应——那不是在倾听。"},
        {en:"Active listening helped us understand the complaint was about communication, not the product.",zh:"积极倾听帮助我们理解投诉是关于沟通的，而不是产品。"},
        {en:"Train your team in active listening — it reduces misunderstandings and builds rapport.",zh:"训练你的团队进行积极倾听——它减少误解并建立融洽关系。"}
      ]},
    vocab:[{en:"active listening",zh:"积极倾听"},{en:"paraphrase",zh:"用自己的话重述"},{en:"rapport",zh:"融洽关系"},{en:"intent",zh:"意图"},{en:"concentrate",zh:"专注"}],
    translation:{zh:"在客户表达不满时，最重要的是先认真倾听，弄清楚对方真正的诉求，再给出解决方案。",en:"When clients express dissatisfaction, the most important thing is to first listen carefully, understand what they truly want, and then provide a solution."},

  {date:"2026-04-16",week:24,day:"周四",themeEn:"Debrief",themeZh:"事后复盘",

  {date:"2026-04-18",week:24,day:"周六",themeEn:"Boil the Ocean",themeZh:"贪多嚼不烂/试图做不可能的事",

  {date:"2026-04-19",week:24,day:"周日",themeEn:"Agree to Disagree",themeZh:"求同存异",

// ==================== STATE ====================
let currentDayIdx = 0;
let displayMode = 'both'; // 'en','zh','both'
let listeningPass = 1;
let listeningPlaying = false;
let currentUtterance = null;
let orderUserSeq = [];
let orderShuffled = [];
let _dictSession = 0;  // 听写 seek 会话令牌，防止旧 utterance 的 boundary 事件干扰

// ==================== INIT ====================
function init() {
  buildDateSelect();
  selectNearestDate();
  setupModeBtns();
  setupDisplayToggle();
  setupListeningPasses();
  renderDay();
}

function buildDateSelect() {
  const inp = document.getElementById('date-input');
  inp.min = DAYS[0].date;
  inp.max = DAYS[DAYS.length-1].date;
  inp.addEventListener('change', () => {
    const idx = findDayIdx(inp.value);
    if(idx >= 0){ currentDayIdx = idx; renderDay(); }
  });
  document.getElementById('prev-day').onclick = () => {
    if(currentDayIdx > 0){ currentDayIdx--; updateSelect(); renderDay(); }
  };
  document.getElementById('next-day').onclick = () => {
    if(currentDayIdx < DAYS.length-1){ currentDayIdx++; updateSelect(); renderDay(); }
  };
}

function findDayIdx(dateStr) {
  // find exact or nearest
  let best = 0;
  for(let i=0;i<DAYS.length;i++){
    if(DAYS[i].date <= dateStr) best = i;
  }
  return best;
}

function selectNearestDate() {
  const today = new Date().toISOString().slice(0,10);
  currentDayIdx = findDayIdx(today);
  updateSelect();
}

function updateSelect() {
  document.getElementById('date-input').value = DAYS[currentDayIdx].date;
}

function setupModeBtns() {
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-'+btn.dataset.panel).classList.add('active');
      stopSpeech();
    });
  });
}

function setupDisplayToggle() {
  document.querySelector('.display-toggle').addEventListener('click', e => {
    if(!e.target.dataset.disp) return;
    document.querySelectorAll('.display-toggle button').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    displayMode = e.target.dataset.disp;
    renderReadPanel();
  });
}

function setupListeningPasses() {
  document.querySelectorAll('.pass-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pass-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      listeningPass = +btn.dataset.pass;
      stopSpeech();
      renderListeningDisplay();
      updateListenPlayBtn();
    });
  });
}

// ==================== RENDER DAY ====================
function renderDay() {
  stopSpeech();
  const d = DAYS[currentDayIdx];
  document.getElementById('day-week').textContent = `第${d.week}周 · ${d.day}`;
  document.getElementById('day-theme-en').textContent = d.themeEn;
  document.getElementById('day-theme-zh').textContent = d.themeZh;
  renderReadPanel();
  renderListeningPanel();
  renderVocabPanel();
  renderOrderPanel();
  renderFillPanel();
  renderTransPanel();
  renderDictationPanel();
}

// ==================== READ PANEL ====================
function esc(s){ return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function renderReadPanel() {
  const d = DAYS[currentDayIdx];
  const show = displayMode;

  // A level
  const aDiv = document.getElementById('read-a');
  aDiv.innerHTML = `
    <div class="sentence-row">
      <div class="num">A</div>
      <div class="texts">
        ${show!=='zh'?`<div class="en">${d.levelA.en}</div>`:''}
        ${show!=='en'?`<div class="zh">${d.levelA.zh}</div>`:''}
      </div>
      <button class="play-btn" data-text="${esc(d.levelA.en)}" onclick="speakText(this.dataset.text,null)">▶ 朗读</button>
      <button class="stop-btn" onclick="stopSpeech()">⏹ 停止</button>
      <button class="follow-btn" id="follow-a" data-text="${esc(d.levelA.en)}" onclick="followRead(this.dataset.text,this)">🔁 跟读</button>
    </div>`;

  // BC sentences
  const bcDiv = document.getElementById('read-bc');
  const allSentences = [d.levelBC.intro, ...d.levelBC.sentences];
  bcDiv.innerHTML = allSentences.map((s,i) => `
    <div class="sentence-row">
      <div class="num">${i===0?'★':i}</div>
      <div class="texts">
        ${show!=='zh'?`<div class="en">${s.en}</div>`:''}
        ${show!=='en'?`<div class="zh">${s.zh}</div>`:''}
      </div>
      <button class="play-btn" data-text="${esc(s.en)}" onclick="speakText(this.dataset.text,null)">▶ 朗读</button>
      <button class="stop-btn" onclick="stopSpeech()">⏹ 停止</button>
      <button class="follow-btn" data-text="${esc(s.en)}" onclick="followRead(this.dataset.text,this)">🔁 跟读</button>
    </div>`).join('');

  document.getElementById('play-all-btn').onclick = () => playAllBC();
}

function playAllBC() {
  stopSpeech();          // 停止当前播放
  _ttsStopped = false;  // 立刻重置，让新序列能正常启动
  const d = DAYS[currentDayIdx];
  const texts = [d.levelBC.intro, ...d.levelBC.sentences].map(s=>s.en);
  playSequence(texts, 0, null);
}

function renderListeningDisplay() {
  const d = DAYS[currentDayIdx];
  const el = document.getElementById('listening-display');
  const allSentences = [d.levelBC.intro, ...d.levelBC.sentences];
  el.innerHTML = allSentences.map((s, i) => {
    let textContent = '';
    if (listeningPass === 1) {
      textContent = `<span style="color:#94a3b8;font-size:13px">🔇 句子 ${i+1}（字幕隐藏，专注听音）</span>`;
    } else if (listeningPass === 2) {
      textContent = `<span class="en">${s.en}</span>`;
    } else {
      textContent = `<span class="en">${s.en}</span><br><span class="zh" style="color:#64748b;font-size:13px">${s.zh}</span>`;
    }
    const safeEn = esc(s.en);
    return `
      <div class="sentence-item" id="listen-item-${i}">
        <div style="display:flex;align-items:flex-start;gap:8px">

            <button class="play-btn" style="padding:5px 9px;font-size:12px" data-text="${safeEn}" onclick="speakText(this.dataset.text,null)" title="朗读这句">▶ 朗读</button>
            <button class="stop-btn" style="padding:5px 9px;font-size:12px" onclick="stopSpeech()" title="停止">⏹ 停止</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function updateListenPlayBtn() {
  const labels = ['','▶ 第1遍：无字幕朗读','▶ 第2遍：英文字幕朗读','▶ 第3遍：中英双语朗读'];
  document.getElementById('listen-play-btn').textContent = labels[listeningPass];
}

function startListeningPass() {
  const btn = document.getElementById('listen-play-btn');
  if (listeningPlaying) {
    stopSpeech();
    updateListenPlayBtn();
    return;
  }
  const d = DAYS[currentDayIdx];
  const allSentences = [d.levelBC.intro, ...d.levelBC.sentences];
  const texts = allSentences.map(s=>s.en);
  document.querySelectorAll('.pass-btn').forEach((b,i)=>{ if(i+1<listeningPass) b.classList.add('done'); });
  listeningPlaying = true;
  _ttsStopped = false;   // 重置停止标志，让序列能正常启动
  btn.textContent = '⏹ 停止朗读';
  playSequenceHighlight(texts, 0, () => {
    listeningPlaying = false;
    document.querySelectorAll('.pass-btn').forEach((b,i)=>{ if(i+1===listeningPass) b.classList.add('done'); });
    updateListenPlayBtn();
  });
}

function playSequenceHighlight(texts, idx, done) {
  // ⚠️ 入口不检查 _ttsStopped：speakText 内部会重置该标志
  // 句间回调里再检查，保证 stop 后不继续下一句
  if (idx >= texts.length) {
    document.querySelectorAll('.sentence-item').forEach(el=>el.classList.remove('current'));
    if (done) done();
    return;
  }
  document.querySelectorAll('.sentence-item').forEach((el,i)=>el.classList.toggle('current',i===idx));
  speakText(texts[idx], null, () => {
    if (_ttsStopped) {
      document.querySelectorAll('.sentence-item').forEach(el=>el.classList.remove('current'));
      if (done) done();
      return;
    }
    playSequenceHighlight(texts, idx+1, done);
  }, true /* fromSequence */);
}

function startVocabBand() {
  const d = DAYS[currentDayIdx];
  const btn = document.getElementById('vocab-band-btn');

  btn.textContent = '🔊 带读中...';
  let i = 0;

  }
}

// ==================== AUTO-GENERATE LISTENING & DICTATION ====================
function getListening(d) {
  if (d.listening) return d.listening;
  // Auto-generate from first 3 sentences, blank out vocab words
  const sentences = [d.levelBC.intro, ...d.levelBC.sentences.slice(0, 2)];
  const original = sentences.map(s => s.en).join(' ');
  let displayText = original;
  const blanks = [];
  // Sort vocab longest-first so multi-word phrases match before single words
  const sortedVocab = [...d.vocab].sort((a,b) => b.en.length - a.en.length);
  for (const v of sortedVocab) {
    if (blanks.length >= 4) break;
    const escaped = v.en.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(escaped, 'i');
    if (regex.test(displayText)) {
      displayText = displayText.replace(regex, '[BLANK]');
      blanks.push(v.en);
    }
  }
  if (blanks.length === 0) return null;
  return { original, text: displayText, blanks };
}

function getDictation(d) {
  if (d.dictation) return d.dictation;
  // Use translation sentence as dictation
  return d.translation.en;
}

// ==================== FILL BLANK ====================
function renderFillPanel() {
  const d = DAYS[currentDayIdx];
  const el = document.getElementById('fill-content');
  const listen = getListening(d);

  if (!listen) {
    el.innerHTML = '<div class="no-content">本日暂无听力填空内容</div>';
    document.getElementById('check-fill-btn').style.display='none';
    document.getElementById('reveal-fill-btn').style.display='none';
    document.getElementById('reset-fill-btn').style.display='none';
    return;
  }
  document.getElementById('check-fill-btn').style.display='';
  document.getElementById('reveal-fill-btn').style.display='';
  document.getElementById('reset-fill-btn').style.display='';

  let blankIdx = 0;
  const html = listen.text.replace(/\[BLANK\]/g, () => {
    return `<input class="blank-input" data-blank="${blankIdx++}" placeholder="___">`;
  });
  el.innerHTML = `
    <div style="margin-bottom:12px">
      <button class="play-btn" id="play-fill-btn" style="padding:8px 16px;font-size:14px;width:auto"
        onclick="speakFillText()">▶ 听原文</button>
      <span style="font-size:12px;color:#64748b;margin-left:8px">先听，再填写下方空格</span>
    </div>
    <div class="fill-text">${html}</div>`;

  document.getElementById('check-fill-btn').onclick = checkFill;
  document.getElementById('reveal-fill-btn').onclick = revealFill;
  document.getElementById('reset-fill-btn').onclick = renderFillPanel;
  document.getElementById('fill-result').textContent = '';
}

function speakFillText() {
  const d = DAYS[currentDayIdx];
  const listen = getListening(d);
  if (!listen) return;
  const btn = document.getElementById('play-fill-btn');
  speakText(listen.original, btn);
}

function checkFill() {
  const d = DAYS[currentDayIdx];
  const listen = getListening(d);
  const inputs = document.querySelectorAll('.blank-input');
  let correct = 0;
  inputs.forEach((inp,i) => {
    const userVal = inp.value.trim().toLowerCase();
    const ans = listen.blanks[i].toLowerCase();
    if (userVal === ans) { inp.classList.add('correct'); inp.classList.remove('wrong'); correct++; }
    else { inp.classList.add('wrong'); inp.classList.remove('correct'); }
  });
  document.getElementById('fill-result').innerHTML = `<span style="color:${correct===inputs.length?'#166534':'#991b1b'}">得分：${correct} / ${inputs.length}</span>`;
}

function revealFill() {
  const d = DAYS[currentDayIdx];
  const listen = getListening(d);
  document.querySelectorAll('.blank-input').forEach((inp,i) => {
    inp.value = listen.blanks[i];
    inp.classList.add('correct'); inp.classList.remove('wrong');
  });
  document.getElementById('fill-result').innerHTML = '<span style="color:#1a56db">答案已显示</span>';

// ==================== DICTATION ====================
function renderDictationPanel() {
  const d = DAYS[currentDayIdx];
  const dictText = getDictation(d);
  document.getElementById('dictation-input').value = '';
  const ansEl = document.getElementById('dictation-answer');
  ansEl.style.display = 'none';
  document.getElementById('dictation-result').textContent = '';
  document.getElementById('check-dictation-btn').style.display = '';
  document.getElementById('reveal-dictation-btn').style.display = '';
  ansEl.textContent = dictText;

  const playBtn = document.getElementById('play-dictation-btn');
  const stopBtn = document.getElementById('stop-dictation-btn');
  const slider  = document.getElementById('dictation-seek');

  // ── 状态 ──────────────────────────────────────────────────
  let dictState       = 'idle';   // 'idle' | 'playing' | 'paused'
  let playStartOffset = 0;        // 本次 speak() 从文本第几个字符开始

  slider.value = 0;

  // ── 刷新播放按钮外观 ──────────────────────────────────────
  const applyPlayBtn = () => {
    if (dictState === 'playing') {
      playBtn.disabled = false;
      playBtn.style.background = '#f59e0b';   // 橙：点击可暂停
      playBtn.textContent = '⏸ 暂停';
    } else if (dictState === 'paused') {
      playBtn.disabled = false;
      playBtn.style.background = '#10b981';   // 绿：点击可继续
      playBtn.textContent = '▶ 继续';
    } else {                                   // idle
      playBtn.style.background = '';
      playBtn.disabled = !dictText;
      playBtn.textContent = dictText ? '▶ 播放' : '（今日无听写）';
    }
  };

  applyPlayBtn();

  // ── 从指定字符偏移量开始朗读 ──────────────────────────────
  const startPlayFrom = (offset) => {
    offset = Math.max(0, Math.min(offset, dictText.length - 1));
    playStartOffset = offset;
    const textToSpeak = dictText.slice(offset);

    _dictSession++;                          // 让旧 utterance 的 boundary 事件失效
    const capturedSession = _dictSession;

    dictState = 'playing';
    applyPlayBtn();

    speakText(textToSpeak, null, () => {
      if (capturedSession !== _dictSession) return;  // 已被新请求取代
      dictState = 'idle';
      slider.value = 100;
      applyPlayBtn();
    });

    // 等 speakText 把 utterance push 进 _uttPool 后挂上 boundary 监听
    requestAnimationFrame(() => {
      const u = _uttPool[_uttPool.length - 1];
      if (!u) return;
      u.onboundary = (e) => {
        if (_dictSession !== capturedSession) return;  // ghost event，忽略
        if (dictState !== 'playing') return;
        const absPos = playStartOffset + (e.charIndex || 0);
        slider.value = Math.min(100, Math.round(absPos / dictText.length * 100));
      };
    });
  };

  // ── 播放 / 暂停 / 继续 三态切换 ──────────────────────────
  playBtn.onclick = () => {
    if (!dictText) return;
    const ss = window.speechSynthesis;

    // 外部（切换 Tab 等）已把 SS 取消，但我们误以为在播放
    if (dictState === 'playing' && !ss.speaking && !ss.pending) {
      dictState = 'idle';
      applyPlayBtn();
      return;
    }

    if (dictState === 'playing') {
      ss.pause();
      dictState = 'paused';
      applyPlayBtn();
      return;
    }

    if (dictState === 'paused') {
      ss.resume();
      dictState = 'playing';
      applyPlayBtn();
      return;
    }

    // idle → 从进度条当前位置开始播放（0 = 从头）
    const offset = Math.floor(parseInt(slider.value, 10) / 100 * dictText.length);
    startPlayFrom(offset);
  };

  // ── 停止：完全重置（进度条保留当前位置，方便从同点重播）──
  stopBtn.onclick = () => {
    _dictSession++;
    stopSpeech();
    dictState = 'idle';
    applyPlayBtn();
  };

  // ── 拖动进度条结束时 seek ─────────────────────────────────
  const onSeekEnd = () => {
    const offset = Math.floor(parseInt(slider.value, 10) / 100 * dictText.length);
    if (dictState === 'idle') return;  // 未播放时只定位，不自动开始
    _dictSession++;
    stopSpeech();
    setTimeout(() => startPlayFrom(offset), 120);  // 等 cancel 生效
  };

  slider.addEventListener('mouseup',  onSeekEnd);
  slider.addEventListener('touchend', onSeekEnd);

  document.getElementById('check-dictation-btn').onclick = () => {
    const userAns    = document.getElementById('dictation-input').value.trim().toLowerCase();
    const correctAns = dictText.toLowerCase().replace(/[.,!?—]/g, '');
    const userClean  = userAns.replace(/[.,!?—]/g, '');
    const words      = correctAns.split(/\s+/);
    const userWords  = userClean.split(/\s+/);
    let matched = 0;
    words.forEach(w => { if (userWords.includes(w)) matched++; });
    const score = Math.round(matched / words.length * 100);
    document.getElementById('dictation-result').innerHTML =
      `<span style="color:${score >= 80 ? '#166534' : '#991b1b'}">匹配度：${score}%（${matched}/${words.length}个单词正确）</span>`;
  };

  document.getElementById('reveal-dictation-btn').onclick = () => {
    ansEl.style.display = 'block';
  };
}

// ==================== SPEECH ====================
const _uttPool = [];          // GC 保护池
let _ttsTimerId  = null;
let _ttsStopped  = false;

function _ttsStatus(msg, color) {
  const el = document.getElementById('tts-status');
  if (!el) return;
  el.textContent = msg;
  el.style.background = color || '#1e293b';
  el.style.display = 'block';
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(() => { el.style.display = 'none'; }, 5000);
}

// ── 核心朗读函数：极简，与 TTS 测试按钮完全一致 ──────────────────
// fromSequence=true：序列内部调用，不重置 listeningPlaying
function speakText(text, btn, onEnd, fromSequence) {
  const ss = window.speechSynthesis;
  if (!ss) { _ttsStatus('❌ 不支持TTS', '#dc2626'); return; }
  if (!text || !text.trim()) { _ttsStatus('⚠️ 文本为空', '#b45309'); return; }

  if (!fromSequence) { listeningPlaying = false; updateListenPlayBtn(); }
  _ttsStopped = false;
  clearTimeout(_ttsTimerId);

  const short = text.slice(0, 28) + (text.length > 28 ? '…' : '');
  _ttsStatus('⏳ ' + short);

  // 有内容正在播 → cancel 后等 200ms 再说
  // 空闲 → 直接说（和测试按钮一样，绝不多余 cancel）
  if (ss.speaking || ss.pending) {
    ss.cancel();
    _ttsTimerId = setTimeout(() => { if (!_ttsStopped) _speak(ss, text, short, onEnd); }, 200);
  } else {
    _speak(ss, text, short, onEnd);
  }
}

function _speak(ss, text, short, onEnd, attempt) {
  attempt = attempt || 0;
  const u = new SpeechSynthesisUtterance(text);
  _uttPool.push(u); if (_uttPool.length > 10) _uttPool.shift();
  currentUtterance = u;

  let settled = false;  // 防止 onend/onerror/静默检测 多次触发
  const done = (callBack) => {
    if (settled) return; settled = true;
    if (callBack && !_ttsStopped && onEnd) setTimeout(onEnd, 50);
  };

  u.onstart = () => _ttsStatus('▶ ' + short, '#166534');
  u.onend   = () => { _ttsStatus('✅ 完成', '#166534'); done(true); };
  u.onerror = (e) => {
    _ttsStatus('❌ ' + e.error + ' | ' + short, '#dc2626');
    if (!_ttsStopped && e.error === 'interrupted' && attempt < 1) {
      // interrupted 重试一次
      settled = true;
      ss.cancel();
      setTimeout(() => { if (!_ttsStopped) _speak(ss, text, short, onEnd, 1); }, 200);
    } else {
      done(true);
    }
  };

  ss.speak(u);

  // ── 静默失败检测 ──────────────────────────────────────────────
  // Chrome 某些版本 speak() 不抛错、不触发任何事件、就是没声
  // 500ms 后如果还没 onstart 也没 settled，视为静默失败，cancel + 重试
  if (attempt < 1) {
    setTimeout(() => {
      if (!settled) {
        _ttsStatus('⚠️ 静默失败，自动重试…', '#b45309');
        settled = true;
        ss.cancel();
        setTimeout(() => {
          if (!_ttsStopped) _speak(ss, text, short, onEnd, 1);
        }, 150);
      }
    }, 500);
  }
}

function playSequence(texts, idx, done) {
  // 入口不检查 _ttsStopped，speakText 内部会重置，句间才检查
  if (idx >= texts.length) { if (done) done(); return; }
  speakText(texts[idx], null, () => {
    if (_ttsStopped) { if (done) done(); return; }
    playSequence(texts, idx+1, done);
  }, true /* fromSequence */);
}

function followRead(text, btn) {
  btn.textContent = '▶ 听...';
  btn.disabled = true;
  speakText(text, null, () => {
    btn.textContent = '🎤 跟读！';
    btn.classList.add('your-turn');
    setTimeout(() => {
      btn.textContent = '🔁 跟读';
      btn.classList.remove('your-turn');
      btn.disabled = false;
    }, 3000);
  });
}

function stopSpeech() {
  _ttsStopped = true;
  clearTimeout(_ttsTimerId);
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  listeningPlaying = false;
  updateListenPlayBtn();
  _ttsStatus('⏹ 停止', '#475569');
}

function ttsNuclearTest() {
  const b = document.getElementById('tts-test-btn');
  const ss = window.speechSynthesis;
  if (!ss) { b.textContent = '❌ 不支持TTS'; return; }

  const snap = `说:${ss.speaking} 队:${ss.pending} 停:${ss.paused}`;
  const vLen = ss.getVoices().length;
  b.textContent = `⏳ ${snap} v${vLen}`;
  _ttsStatus(`⏳ TTS测试 | ${snap} | 声音数:${vLen}`);

  // 最裸的 speak —— 不设任何参数，看 Chrome 原始行为
  const u = new SpeechSynthesisUtterance('hello');
  let started = false;
  u.onstart = () => { started = true; b.textContent = '▶ 开始了...'; _ttsStatus('▶ TTS测试 onstart 触发 ✅', '#166534'); };
  u.onend   = () => {
    b.textContent = `✅ 正常 (v${vLen})`;
    _ttsStatus(`✅ TTS测试正常完成 (v${vLen})`, '#166534');
    setTimeout(()=>{ b.textContent='🔊 TTS测试'; },3000);
  };
  u.onerror = (e) => {
    const msg = `❌${e.error}|${started?'有start':'无start'}|v${vLen}|${snap}`;
    b.textContent = msg;
    _ttsStatus('❌ TTS测试失败：' + e.error, '#dc2626');
    setTimeout(()=>{ b.textContent='🔊 TTS测试'; },6000);
  };
  ss.speak(u); // 不 cancel，不 resume，绝对最小干预
}

init();
</script>

<!-- PWA: Service Worker 注册 + 安装按钮 -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(r => console.log('[PWA] SW 已注册:', r.scope))
      .catch(e => console.warn('[PWA] SW 注册失败:', e));
  });
}

// 安卓 Chrome 安装提示
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  const btn = document.getElementById('install-btn');
  if (btn) btn.style.display = 'block';
});
document.getElementById('install-btn').addEventListener('click', () => {
  if (!_installPrompt) return;
  _installPrompt.prompt();
  _installPrompt.userChoice.then(() => {
    _installPrompt = null;
    document.getElementById('install-btn').style.display = 'none';
  });
});
// iOS 不触发 beforeinstallprompt，隐藏按钮
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true;
if (isIOS && !isStandalone) {
  // iOS 上改按钮文字提示用 Safari 分享键安装
  const btn = document.getElementById('install-btn');
  btn.style.display = 'block';
  btn.textContent = '📲 加主屏';
  btn.onclick = () => alert('iOS 安装方法：\n点底部「分享」按钮 →「添加到主屏幕」→ 添加');
}
</script>
